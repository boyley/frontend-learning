<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 · Hash vs History 对比</title>
  <style>
    body { font-family: system-ui, "PingFang SC", sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 20px; }
    .switch { display: flex; gap: 8px; margin: 16px 0; }
    .switch button { padding: 8px 18px; border: 1px solid #4f46e5; background: #fff; color: #4f46e5; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .switch button.active { background: #4f46e5; color: #fff; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .row { display: flex; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
    .row .label { width: 150px; color: #6b7280; flex-shrink: 0; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, monospace; }
    .server { background: #f9fafb; border-left: 4px solid #4f46e5; padding: 10px 12px; font-size: 13px; margin-top: 10px; }
    .ok { color: #16a34a; font-weight: 700; } .bad { color: #dc2626; font-weight: 700; }
  </style>
</head>
<body>
  <h1>04 · Hash vs History 交互对比</h1>

  <div class="switch">
    <button id="btnHash" class="active" onclick="setMode('hash')">Hash 模式</button>
    <button id="btnHistory" onclick="setMode('history')">History 模式</button>
  </div>

  <div class="card" id="panel"></div>

  <script>
    const data = {
      hash: {
        name: 'Hash 模式',
        url: 'example.com/#/about',
        api: 'location.hash + hashchange 事件',
        event: 'hashchange（代码赋值也会触发）',
        toServer: '# 后内容<b>不发送</b>给服务器',
        server: '<b>无需任何配置</b>',
        refresh: '<span class="ok">✅ 刷新永不 404</span>（服务器只看到 example.com/，恒返回 index.html）',
        seo: '较差（# 后不被索引）',
        conf: '// 不需要服务器配置'
      },
      history: {
        name: 'History 模式',
        url: 'example.com/about（干净，无 #）',
        api: 'history.pushState + popstate 事件',
        event: 'popstate（仅前进后退；pushState 需手动渲染）',
        toServer: 'pathname <b>会发送</b>给服务器',
        server: '<b>必须</b>把所有路径回退到 index.html',
        refresh: '未配置：<span class="bad">❌ 刷新 /about 会 404</span>；配置 try_files 后 <span class="ok">✅ 正常</span>',
        seo: '较好（真实路径，配合 SSR 最佳）',
        conf: 'location / {\n  try_files $uri $uri/ /index.html;\n}'
      }
    };
    function setMode(m) {
      document.getElementById('btnHash').classList.toggle('active', m === 'hash');
      document.getElementById('btnHistory').classList.toggle('active', m === 'history');
      const d = data[m];
      document.getElementById('panel').innerHTML = `
        <h2>${d.name}</h2>
        <div class="row"><span class="label">URL 形态</span><code>${d.url}</code></div>
        <div class="row"><span class="label">底层 API</span>${d.api}</div>
        <div class="row"><span class="label">感知变化</span>${d.event}</div>
        <div class="row"><span class="label">是否发给服务器</span>${d.toServer}</div>
        <div class="row"><span class="label">服务器配置</span>${d.server}</div>
        <div class="row"><span class="label">刷新子路由</span>${d.refresh}</div>
        <div class="row"><span class="label">SEO</span>${d.seo}</div>
        <div class="server"><b>Nginx 配置：</b><pre style="margin:6px 0 0">${d.conf}</pre></div>`;
    }
    setMode('hash');
  </script>
</body>
</html>
