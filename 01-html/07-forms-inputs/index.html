<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>07 · 表单与输入控件演示</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 24px auto; padding: 0 16px; line-height: 1.6; color: #222; }
    h1 { font-size: 22px; }
    fieldset { border: 1px solid #cbd5e1; border-radius: 10px; margin: 0 0 18px; padding: 14px 16px; }
    legend { font-weight: 600; color: #2563eb; padding: 0 6px; }
    .row { margin: 10px 0; }
    /* 块级 label 让点击范围更大，配合 for 关联控件 */
    label { display: inline-block; min-width: 96px; vertical-align: top; }
    input:not([type=radio]):not([type=checkbox]):not([type=color]):not([type=range]):not([type=file]),
    textarea, select {
      padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; min-width: 220px; font: inherit;
    }
    button { font: inherit; padding: 8px 18px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
    button.reset { background: #e2e8f0; color: #334155; }
    output { display: block; margin-top: 12px; padding: 10px; background: #f1f5f9; border-radius: 8px; white-space: pre-wrap; font-size: 13px; }
  </style>
</head>
<body>
  <h1>综合表单：label 关联 / 各类 input / select / textarea</h1>

  <!--
    form 的两个核心属性：
    action：提交目标地址（这里用 #demo 仅作演示，不真正发请求）
    method：提交方式，GET 把数据拼到 URL，POST 放进请求体
    每个控件的 name 才是提交时的“字段名”，没有 name 不会被提交
  -->
  <form action="#demo" method="get" id="myForm">

    <fieldset>
      <!-- fieldset+legend 把相关控件分组，对无障碍友好 -->
      <legend>基本信息</legend>

      <div class="row">
        <!-- label 的 for 必须等于目标控件的 id，点击文字即可聚焦输入框 -->
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="字母或数字" />
      </div>

      <div class="row">
        <label for="pwd">密码</label>
        <!-- type=password 输入内容显示为圆点 -->
        <input type="password" id="pwd" name="password" />
      </div>

      <div class="row">
        <label for="email">邮箱</label>
        <!-- type=email 提供邮箱键盘并参与原生校验 -->
        <input type="email" id="email" name="email" placeholder="you@example.com" />
      </div>

      <div class="row">
        <label for="age">年龄</label>
        <!-- type=number 带上下步进；min/max/step 约束取值 -->
        <input type="number" id="age" name="age" min="0" max="120" step="1" />
      </div>
    </fieldset>

    <fieldset>
      <legend>偏好选择</legend>

      <div class="row">
        <label>性别</label>
        <!--
          单选按钮：同一组的 name 必须相同（gender），互斥
          每个 radio 单独配一个 label，用 for/id 关联
          checked 设为默认选中
        -->
        <input type="radio" id="g-male" name="gender" value="male" checked />
        <label for="g-male" style="min-width:auto">男</label>
        <input type="radio" id="g-female" name="gender" value="female" />
        <label for="g-female" style="min-width:auto">女</label>
      </div>

      <div class="row">
        <label>爱好</label>
        <!-- 复选框可多选，name 相同则以同名多值提交 -->
        <input type="checkbox" id="h-code" name="hobby" value="code" />
        <label for="h-code" style="min-width:auto">编程</label>
        <input type="checkbox" id="h-music" name="hobby" value="music" />
        <label for="h-music" style="min-width:auto">音乐</label>
      </div>

      <div class="row">
        <label for="city">城市</label>
        <!-- 下拉选择：select 容器 + option 选项，value 是提交值 -->
        <select id="city" name="city">
          <option value="">请选择</option>
          <option value="bj">北京</option>
          <option value="sh">上海</option>
          <option value="gz">广州</option>
        </select>
      </div>
    </fieldset>

    <fieldset>
      <legend>更多控件</legend>

      <div class="row">
        <label for="birth">生日</label>
        <!-- type=date 弹出日期选择器 -->
        <input type="date" id="birth" name="birth" />
      </div>

      <div class="row">
        <label for="level">满意度</label>
        <!-- type=range 滑块；oninput 实时把值显示到右侧 -->
        <input type="range" id="level" name="level" min="0" max="10" value="5"
               oninput="document.getElementById('levelVal').textContent = this.value" />
        <span id="levelVal">5</span>
      </div>

      <div class="row">
        <label for="color">主题色</label>
        <!-- type=color 调色板，值是 #RRGGBB -->
        <input type="color" id="color" name="color" value="#2563eb" />
      </div>

      <div class="row">
        <label for="avatar">头像</label>
        <!-- type=file 选择本地文件；accept 限制类型 -->
        <input type="file" id="avatar" name="avatar" accept="image/*" />
      </div>

      <div class="row">
        <label for="bio">简介</label>
        <!-- textarea 多行文本，rows 控制可见行数 -->
        <textarea id="bio" name="bio" rows="3" placeholder="一句话介绍自己"></textarea>
      </div>
    </fieldset>

    <!--
      button 的 type：
      submit 提交表单（默认）、reset 重置、button 普通按钮（需自己绑事件）
    -->
    <button type="submit">提交</button>
    <button type="reset" class="reset">重置</button>

    <!-- output 用来演示：拦截提交，把表单数据回显出来 -->
    <output id="result"></output>
  </form>

  <script>
    // 仅为演示：阻止真实提交，用 FormData 收集所有带 name 的字段并回显
    const form = document.getElementById('myForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault(); // 阻止页面跳转，方便观察
      const data = new FormData(form); // FormData 自动收集所有 name 字段
      const lines = [];
      for (const [key, value] of data.entries()) {
        // 文件类型会得到 File 对象，这里只取文件名
        lines.push(`${key} = ${value instanceof File ? value.name || '(未选)' : value}`);
      }
      document.getElementById('result').textContent =
        '将提交的数据（name=value）：\n' + lines.join('\n');
    });
  </script>
</body>
</html>
