<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- ===== 基础元数据 ===== -->

  <!-- charset：声明字符编码，必须放 head 最前面（前 1024 字节内），防止中文乱码 -->
  <meta charset="UTF-8">

  <!-- viewport：移动端按设备宽度渲染、初始缩放 1.0，是响应式网页的必备 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- title：浏览器标签页标题，也是搜索结果里的大蓝标题，SEO 极重要（建议 <60 字） -->
  <title>HTML 元数据与 SEO 入门 · 前端学习合集</title>

  <!-- description：页面摘要，常显示为搜索结果的描述文字（建议 120~160 字） -->
  <meta name="description" content="一篇讲解 HTML head 元数据与 SEO 基础的教学页面，涵盖 charset、viewport、description、robots、Open Graph、canonical 等。">

  <!-- keywords：关键词。现代主流搜索引擎基本忽略，仅作历史了解，可不写 -->
  <meta name="keywords" content="HTML, SEO, 元数据, Open Graph, meta 标签">

  <!-- robots：告诉搜索引擎爬虫如何处理本页。index 允许收录，follow 允许跟踪链接 -->
  <meta name="robots" content="index, follow">

  <!-- author：作者信息 -->
  <meta name="author" content="前端学习合集">

  <!-- ===== Open Graph：控制分享到社交平台时的卡片样式 ===== -->
  <!-- og:title 分享卡片标题 -->
  <meta property="og:title" content="HTML 元数据与 SEO 入门">
  <!-- og:description 分享卡片描述 -->
  <meta property="og:description" content="对照 MDN 学习 head 里的元数据如何影响 SEO 与社交分享。">
  <!-- og:type 内容类型，文章用 article，网站首页用 website -->
  <meta property="og:type" content="article">
  <!-- og:image 分享卡片缩略图（建议 1200x630） -->
  <meta property="og:image" content="https://interactive-examples.mdn.mozilla.net/media/examples/flower.jpg">
  <!-- og:url 本页规范地址 -->
  <meta property="og:url" content="https://example.com/12-metadata-seo/">

  <!-- ===== link 系列 ===== -->
  <!-- canonical：规范链接，告诉搜索引擎本页内容的"权威唯一地址"，避免重复内容分散权重 -->
  <link rel="canonical" href="https://example.com/12-metadata-seo/">

  <!-- favicon：浏览器标签页/收藏夹的小图标。这里用一个内联 SVG 作为示例图标 -->
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📄</text></svg>">

  <style>
    body {
      font-family: system-ui, "Microsoft YaHei", sans-serif;
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px;
      line-height: 1.7;
      color: #222;
    }
    h2 { border-left: 4px solid #2d6cdf; padding-left: 8px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f3f6ff; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>这个页面的 head 里藏了什么？</h1>
  <p>本页的 <code>&lt;head&gt;</code> 配齐了 SEO 与社交分享需要的元数据，右键"查看网页源代码"对照阅读。</p>

  <h2>本页用到的元数据一览</h2>
  <table>
    <thead>
      <tr><th>标签</th><th>作用</th></tr>
    </thead>
    <tbody>
      <tr><td><code>&lt;meta charset&gt;</code></td><td>字符编码，防乱码</td></tr>
      <tr><td><code>&lt;meta viewport&gt;</code></td><td>移动端适配</td></tr>
      <tr><td><code>&lt;title&gt;</code></td><td>标签页标题 + 搜索结果大标题</td></tr>
      <tr><td><code>&lt;meta description&gt;</code></td><td>搜索结果摘要文字</td></tr>
      <tr><td><code>&lt;meta robots&gt;</code></td><td>是否允许收录/跟踪链接</td></tr>
      <tr><td><code>og:*</code></td><td>社交平台分享卡片</td></tr>
      <tr><td><code>link canonical</code></td><td>规范唯一地址，防重复内容</td></tr>
      <tr><td><code>link icon</code></td><td>favicon 网站图标</td></tr>
    </tbody>
  </table>
</body>
</html>
