<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>06 · Fetch 网络请求</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
      background: #f5f6fa;
      color: #2c3e50;
      line-height: 1.6;
    }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; margin-top: 30px; border-left: 4px solid #6c5ce7; padding-left: 10px; }
    .card {
      background: #fff; border-radius: 10px; padding: 18px 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); margin-top: 14px;
    }
    button {
      background: #6c5ce7; color: #fff; border: none; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; font-size: 14px; margin: 4px 6px 4px 0;
    }
    button:hover { background: #5a4bd1; }
    button.danger { background: #e17055; }
    input, textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #dcdde1;
      border-radius: 6px; font-size: 14px; margin: 4px 0;
    }
    .result {
      border-radius: 6px; padding: 12px; font-size: 14px; margin-top: 10px;
      min-height: 24px; background: #f1f2f6; word-break: break-word;
    }
    .result.loading { background: #fff3cd; color: #856404; }
    .result.success { background: #e7f9ef; color: #1e7e44; }
    .result.error { background: #fdecea; color: #c0392b; }
    .result ol { margin: 0; padding-left: 20px; }
    .result li { margin: 4px 0; }
    .net-note {
      background: #6c5ce7; color: #fff; padding: 8px 12px; border-radius: 6px;
      font-size: 13px; display: inline-block;
    }
    .tip { font-size: 13px; color: #7f8c8d; }
  </style>
</head>
<body>
  <h1>06 · Fetch 网络请求（Fetch API）</h1>
  <p class="net-note">⚠️ 本页需要联网，使用公共测试接口 jsonplaceholder.typicode.com</p>

  <h2>① GET 单篇文章（.then 链式 + response.ok 判断）</h2>
  <div class="card">
    <button id="btn-get-one">GET /posts/1</button>
    <div class="result" id="get-one-result">点击按钮发起请求。</div>
  </div>

  <h2>② GET 列表（async/await 写法）</h2>
  <div class="card">
    <button id="btn-get-list">GET /posts?_limit=5</button>
    <div class="result" id="get-list-result">点击按钮加载文章列表。</div>
  </div>

  <h2>③ POST 新建文章</h2>
  <div class="card">
    <input id="post-title" placeholder="标题" value="我的第一篇 Fetch 文章" />
    <textarea id="post-body" rows="2" placeholder="正文">用 fetch 发送 POST 请求，body 需 JSON.stringify。</textarea>
    <button id="btn-post">POST /posts</button>
    <div class="result" id="post-result">填写后点击提交，查看服务器返回（含新分配的 id）。</div>
  </div>

  <h2>④ AbortController 取消请求</h2>
  <div class="card">
    <p class="tip">先点「发起请求」，趁加载时立即点「取消请求」，观察 AbortError。</p>
    <button id="btn-abort-start">发起请求 GET /comments</button>
    <button id="btn-abort-cancel" class="danger">🛑 取消请求</button>
    <div class="result" id="abort-result">等待操作。</div>
  </div>

  <script src="demo.js"></script>
</body>
</html>
