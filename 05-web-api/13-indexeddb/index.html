<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>13 · IndexedDB 本地通讯录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 32px 16px;
      color: #2d2d2d;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      overflow: hidden;
    }
    header {
      background: #5b4bc4;
      color: #fff;
      padding: 22px 24px;
    }
    header h1 { font-size: 20px; }
    header p { font-size: 13px; opacity: .85; margin-top: 6px; }
    .body { padding: 24px; }
    .form { display: flex; gap: 8px; flex-wrap: wrap; }
    .form input {
      flex: 1; min-width: 120px;
      padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .form input:focus { border-color: #5b4bc4; }
    button {
      padding: 10px 16px; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; color: #fff;
      background: #5b4bc4; transition: .15s;
    }
    button:hover { filter: brightness(1.08); }
    .toolbar { margin-top: 12px; display: flex; gap: 8px; }
    .toolbar .ghost { background: #eee; color: #555; }
    .toolbar .danger { background: #e2574c; }
    .tip {
      display: none; margin-top: 14px; padding: 10px 12px;
      border-radius: 8px; font-size: 13px;
    }
    .tip.ok { background: #e6f7ed; color: #1a7f44; }
    .tip.err { background: #fdecea; color: #c0392b; }
    ul { list-style: none; margin-top: 18px; }
    li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border: 1px solid #eee; border-radius: 10px;
      margin-bottom: 8px; background: #fafafa;
    }
    li.empty { justify-content: center; color: #999; font-size: 13px; background: #fff; border-style: dashed; }
    .info { display: flex; flex-direction: column; }
    .cname { font-weight: 600; }
    .cphone { font-size: 12px; color: #888; }
    .del { background: #e2574c; padding: 6px 12px; font-size: 12px; }
    .hint { margin-top: 18px; font-size: 12px; color: #888; line-height: 1.7; }
    .hint code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>📒 IndexedDB 本地通讯录</h1>
      <p>数据存在浏览器内置数据库里，刷新 / 关闭页面后依然存在（同源）。</p>
    </header>
    <div class="body">
      <div class="form">
        <input id="name" type="text" placeholder="姓名" />
        <input id="phone" type="text" placeholder="电话（唯一）" />
        <button id="addBtn">➕ 添加</button>
      </div>
      <div class="toolbar">
        <button id="cursorBtn" class="ghost">🔍 游标遍历</button>
        <button id="clearBtn" class="danger">🗑 清空全部</button>
      </div>

      <div id="tip" class="tip"></div>
      <ul id="list"></ul>

      <p class="hint">
        💡 试试：添加几条后<strong>刷新页面</strong>，数据仍在。<br />
        打开 DevTools → Application → IndexedDB → <code>contacts-db</code> 可看到真实存储。
      </p>
    </div>
  </div>

  <!-- 免构建：普通 script，不用 ES module，双击即可运行 -->
  <script src="demo.js"></script>
</body>
</html>
