<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 · 手写 Hash 路由</title>
  <style>
    body { font-family: system-ui, "PingFang SC", sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 20px; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
    a.link { padding: 6px 12px; border: 1px solid #0ea5e9; border-radius: 6px; color: #0ea5e9; text-decoration: none; font-size: 14px; }
    a.link:hover { background: #e0f2fe; }
    button { padding: 6px 12px; border: 1px solid #f59e0b; background: #fff; color: #b45309; border-radius: 6px; cursor: pointer; }
    #app { border: 1px solid #e5e7eb; border-radius: 8px; padding: 18px; min-height: 90px; }
    .bar { font-family: ui-monospace, monospace; background: #f3f4f6; padding: 6px 10px; border-radius: 6px; font-size: 13px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>02 · 手写 Hash 路由（约 40 行，零依赖）</h1>

  <nav>
    <a class="link" href="#/">Home</a>
    <a class="link" href="#/about">About</a>
    <a class="link" href="#/list">List</a>
    <a class="link" href="#/nope">未知路由(404)</a>
  </nav>
  <nav>
    <button onclick="router.push('/about')">router.push('/about')</button>
    <button onclick="history.back()">history.back()</button>
  </nav>

  <div class="bar">当前 location.hash = <span id="hashText"></span></div>
  <div id="app"></div>

  <script>
    /* ============================================================
       手写 HashRouter —— 核心就是「监听 hashchange + 匹配路由表」
       ============================================================ */
    class HashRouter {
      constructor(outlet) {
        this.routes = {};        // 路由表：{ path: handler }
        this.outlet = outlet;    // 路由出口 DOM 节点
        // 关键监听：hash 变化（点链接/后退/前进/改地址栏）都会触发
        window.addEventListener('hashchange', () => this.resolve());
        // 首次进入时 hash 可能已存在（如带 #/about 直接打开），也要解析一次
        window.addEventListener('load', () => this.resolve());
      }
      on(path, handler) {        // 注册一条路由，支持链式调用
        this.routes[path] = handler;
        return this;
      }
      resolve() {                // 解析当前 hash → 匹配 → 渲染
        const path = location.hash.slice(1) || '/';       // "#/about" → "/about"
        document.getElementById('hashText').textContent = location.hash || '(空)';
        const handler = this.routes[path] || this.routes['*']; // '*' 兜底 404
        this.outlet.innerHTML = handler ? handler() : '<h2>404</h2>';
      }
      push(path) {               // 编程式导航：改 hash 即可（自动触发 hashchange）
        location.hash = path;
      }
    }

    /* ============================================================
       使用：注册路由表并渲染
       ============================================================ */
    const router = new HashRouter(document.getElementById('app'));
    router
      .on('/',      () => '<h2>🏠 Home</h2><p>Hash 路由首页。改 hash 不刷新、不发请求。</p>')
      .on('/about', () => '<h2>ℹ️ About</h2><p>关于页。地址栏出现 <code>#/about</code>，但页面没有重新加载。</p>')
      .on('/list',  () => '<h2>📋 List</h2><ul><li>项目 A</li><li>项目 B</li><li>项目 C</li></ul>')
      .on('*',      () => '<h2>404</h2><p>没有匹配到的路由。</p>');   // 通配兜底
  </script>
</body>
</html>
