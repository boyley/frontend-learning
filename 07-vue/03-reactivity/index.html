<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 · 响应式基础</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
    h3 { margin-top: 0; color: #42b883; }
    button { padding: 6px 12px; margin: 4px 4px 0 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>03 · 响应式基础（ref / reactive）</h1>
  <div id="app">

    <div class="card">
      <h3>① ref —— 包装基本类型</h3>
      <p>count = {{ count }}</p>
      <button @click="count++">count + 1</button>
      <small>JS 里要用 count.value，模板里自动解包不写 .value</small>
    </div>

    <div class="card">
      <h3>② reactive —— 包装对象</h3>
      <p>用户：{{ user.name }}，年龄：{{ user.age }}</p>
      <button @click="user.age++">长一岁</button>
      <button @click="user.name = user.name === '小明' ? '小红' : '小明'">改名字</button>
    </div>

    <div class="card">
      <h3>③ ref 也能存对象</h3>
      <p>列表：{{ list }}</p>
      <button @click="list.value && list.push(list.length + 1)">push（注意 .value）</button>
      <button @click="addItem">用方法 push</button>
    </div>

    <div class="card">
      <h3>④ 响应式追踪日志</h3>
      <!-- watchEffect 会自动收集它内部用到的响应式数据作为“依赖”，依赖变了就重跑 -->
      <pre>{{ log }}</pre>
    </div>

  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, reactive, watchEffect } = Vue;
    createApp({
      setup() {
        const count = ref(0);                    // ref：基本类型
        const user = reactive({ name: '小明', age: 18 }); // reactive：对象
        const list = ref([1, 2, 3]);             // ref 也能装数组/对象
        const log = ref('');

        function addItem() {
          list.value.push(list.value.length + 1); // 方法里访问要 .value
        }

        // watchEffect：立即执行一次并自动追踪依赖；count 或 user.age 变化都会触发
        watchEffect(() => {
          log.value = `依赖变化触发 → count=${count.value}, age=${user.age}, ` +
                      `时间 ${new Date().toLocaleTimeString()}`;
        });

        return { count, user, list, log, addItem };
      }
    }).mount('#app');
  </script>
</body>
</html>
