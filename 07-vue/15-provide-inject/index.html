<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 · 依赖注入</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
    h3 { margin-top: 0; color: #42b883; }
    button { padding: 6px 12px; cursor: pointer; }
    .level { border-left: 3px solid #42b883; padding-left: 12px; margin: 8px 0; }
  </style>
</head>
<body>
  <h1>15 · 依赖注入（provide / inject）</h1>
  <div id="app">
    <div class="card">
      <h3>顶层 App 提供主题，跨多层直达孙子组件</h3>
      <button @click="toggleTheme">切换主题（当前：{{ theme }}）</button>
      <!-- middle 不需要主题，也不用层层传 props，孙子组件直接 inject -->
      <middle-comp></middle-comp>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, provide, inject } = Vue;

    const app = createApp({
      setup() {
        const theme = ref('light');
        const toggleTheme = () => (theme.value = theme.value === 'light' ? 'dark' : 'light');

        // provide(key, value)：把数据“提供”给所有后代组件
        // 提供响应式数据 + 修改方法，后代可读可改（受控）
        provide('theme', theme);
        provide('toggleTheme', toggleTheme);

        return { theme, toggleTheme };
      }
    });

    // 中间层组件：完全不碰 theme，只是把孙子组件渲染出来
    app.component('MiddleComp', {
      template: `<div class="level">我是中间层（不参与主题传递）<deep-comp></deep-comp></div>`
    });

    // 深层孙子组件：直接 inject 拿到顶层提供的数据
    app.component('DeepComp', {
      setup() {
        // inject(key, 默认值)：注入祖先提供的数据
        const theme = inject('theme', ref('light'));
        const toggleTheme = inject('toggleTheme', () => {});
        return { theme, toggleTheme };
      },
      template: `
        <div class="level"
             :style="{ background: theme === 'dark' ? '#222' : '#fff',
                       color: theme === 'dark' ? '#fff' : '#000',
                       padding: '10px', borderRadius: '6px' }">
          我是深层孙子组件，注入到的主题：<b>{{ theme }}</b>
          <br /><button @click="toggleTheme">在我这里也能切换主题</button>
        </div>
      `
    });

    app.mount('#app');
  </script>
</body>
</html>
