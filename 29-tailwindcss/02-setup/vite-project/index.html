<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind v4 + Vite</title>
  <!-- 引入我们的入口 CSS，Vite 会交给 @tailwindcss/vite 插件处理 -->
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-slate-100 min-h-screen grid place-items-center font-sans">
  <div class="max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="w-14 h-14 rounded-full bg-brand mx-auto mb-4 grid place-items-center text-white text-2xl font-bold">V</div>
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Vite 工程化跑通了！</h1>
    <p class="text-slate-500 leading-relaxed">
      样式经 <code class="bg-slate-100 px-1 rounded">@tailwindcss/vite</code> 插件 JIT 编译，
      产物只含用到的类，可上生产。
    </p>
  </div>
</body>
</html>
