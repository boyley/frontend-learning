<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同源策略演示 · 仅供学习</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 820px; margin: 24px auto; padding: 0 16px; line-height: 1.6; }
  h1 { font-size: 20px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; flex: 1; min-width: 300px; }
  button { padding: 6px 12px; margin: 4px 0; cursor: pointer; }
  #log { background:#0f172a; color:#a7f3d0; padding:12px; border-radius:8px; font-family: monospace; font-size:13px; white-space:pre-wrap; min-height:120px; }
  .ok { color:#16a34a; } .bad { color:#dc2626; }
  iframe { width:100%; height:80px; border:1px dashed #999; }
  .note { background:#fef9c3; padding:8px 12px; border-radius:6px; font-size:13px; }
</style>
</head>
<body>
  <h1>🔒 同源策略（SOP）演示</h1>
  <p class="note">⚠️ 仅供学习，勿用于攻击真实站点。本页只在你自己的浏览器内演示浏览器的隔离行为。</p>

  <div class="row">
    <div class="card">
      <h3>① 同源 iframe（data: 视为不透明源 / 同文档内）</h3>
      <!-- srcdoc 生成的 iframe 与父页面同源，可被读取 -->
      <iframe id="sameOrigin" srcdoc="<title>我是同源子页</title><body style='font-family:sans-serif'>同源 iframe 内容</body>"></iframe>
      <button onclick="tryRead('sameOrigin','同源')">尝试读取它的 document.title</button>
    </div>

    <div class="card">
      <h3>② 跨源 iframe（example.com）</h3>
      <!-- 加载一个真正跨源的页面，读取其 DOM 会被 SOP 拦截 -->
      <iframe id="crossOrigin" src="https://example.com"></iframe>
      <button onclick="tryRead('crossOrigin','跨源')">尝试读取它的 document.title</button>
    </div>
  </div>

  <h3>日志输出</h3>
  <div id="log"></div>

  <script>
    // ------- 详细中文注释 -------
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
    }

    // 核心：尝试跨窗口读取 iframe 的 document
    // 同源 → 成功读到 title；跨源 → 浏览器抛出 SecurityError
    function tryRead(id, label) {
      const iframe = document.getElementById(id);
      try {
        // contentWindow.document 是「跨源读」的典型场景
        const doc = iframe.contentWindow.document;
        const title = doc.title || '(无标题)';
        log(`✅ [${label}] 读取成功 → document.title = "${title}"`, 'ok');
      } catch (e) {
        // 跨源时进入这里。浏览器会拒绝跨源 DOM 访问以保护数据
        log(`❌ [${label}] 被同源策略拦截 → ${e.name}: ${e.message}`, 'bad');
      }
    }

    log('提示：点击上方两个按钮对比「同源可读」与「跨源被拦」。');
    log('跨源合法通信应改用 window.postMessage(...) 并校验 event.origin。');
  </script>
</body>
</html>
