<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01 · DOM 元素选择</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0; padding: 24px; background: #f5f6fa; color: #222;
    }
    h1 { font-size: 22px; margin: 0 0 6px; }
    .sub { color: #666; margin: 0 0 20px; font-size: 14px; }
    .panel {
      background: #fff; border-radius: 10px; padding: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); margin-bottom: 18px;
    }
    .panel h2 { font-size: 15px; margin: 0 0 12px; color: #3742fa; }
    input[type=text] {
      width: 320px; max-width: 60%; padding: 8px 10px; font-size: 14px;
      border: 1px solid #ccd; border-radius: 6px;
    }
    button {
      padding: 8px 14px; margin: 4px 4px 4px 0; font-size: 13px; cursor: pointer;
      border: none; border-radius: 6px; background: #3742fa; color: #fff;
      transition: background .15s;
    }
    button:hover { background: #2531d8; }
    button.ghost { background: #eceefe; color: #3742fa; }
    button.ghost:hover { background: #dde0fd; }
    #output {
      margin-top: 12px; padding: 10px 12px; background: #f0f3ff;
      border-left: 4px solid #3742fa; border-radius: 4px; font-size: 14px;
      min-height: 20px; white-space: pre-wrap;
    }
    /* 演示用的样例 DOM */
    #playground { line-height: 1.9; }
    #playground .card {
      display: inline-block; padding: 8px 14px; margin: 6px;
      border: 1px solid #ddd; border-radius: 8px; background: #fafbff;
    }
    #playground .tag {
      display: inline-block; padding: 2px 8px; margin: 3px;
      border-radius: 12px; background: #e8eaf6; font-size: 13px;
    }
    /* 高亮样式：被选中的元素加这个 class */
    .hl {
      outline: 3px solid #ff6b6b !important;
      background: #fff3cd !important;
      transition: outline .1s;
    }
    code { background: #eee; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>01 · DOM 元素选择 (DOM Selection)</h1>
  <p class="sub">输入 CSS 选择器或点下面的按钮，被选中的元素会高亮（红框 + 黄底），并显示命中数量。</p>

  <div class="panel">
    <h2>① 自定义选择器</h2>
    <input id="selectorInput" type="text" placeholder="例如：.card  /  #title  /  ul li:first-child  /  p.note" />
    <button id="btnQuery">querySelectorAll 全部</button>
    <button id="btnQueryOne" class="ghost">querySelector 首个</button>
    <div id="output">结果会显示在这里…</div>
  </div>

  <div class="panel">
    <h2>② 各种选择 API 一键演示</h2>
    <button data-demo="byId">getElementById('title')</button>
    <button data-demo="byClass">getElementsByClassName('card')</button>
    <button data-demo="byTag">getElementsByTagName('li')</button>
    <button data-demo="qsa">querySelectorAll('.tag')</button>
    <button data-demo="closest" class="ghost">第一个 .tag 的 closest('.card')</button>
    <button data-demo="matches" class="ghost">检测 #title 是否 matches('h3.head')</button>
    <button data-demo="liveVsStatic" class="ghost">动态 vs 静态集合对比</button>
    <button id="btnClear" class="ghost">清除高亮</button>
  </div>

  <div class="panel">
    <h2>③ 演示用的页面结构（操作目标）</h2>
    <div id="playground">
      <h3 id="title" class="head">水果商店</h3>
      <div class="card" data-fruit="apple">
        苹果
        <span class="tag">红色</span>
        <span class="tag">脆甜</span>
      </div>
      <div class="card" data-fruit="banana">
        香蕉
        <span class="tag">黄色</span>
        <span class="tag">软糯</span>
      </div>
      <p class="note">下面是一个列表：</p>
      <ul id="list">
        <li>列表项 1</li>
        <li>列表项 2</li>
        <li>列表项 3</li>
      </ul>
    </div>
  </div>

  <script src="demo.js"></script>
</body>
</html>
