# nginx.conf
# ─────────────────────────────────────────────────────────────
# 一个「最小可用」的 Nginx 主配置骨架，演示第三大用途：静态文件服务。
# 结构是固定的三层：全局 → events → http → server → location。
# 可用 docker 直接试跑（见 README「运行方式」）。
# ─────────────────────────────────────────────────────────────

# ===== 全局块：影响整个 Nginx 运行的参数 =====
worker_processes auto;   # 工作进程数，auto = 跟 CPU 核数一致，充分利用多核

# ===== events 块：连接处理相关 =====
events {
    worker_connections 1024;   # 每个 worker 进程最多同时处理的连接数
}

# ===== http 块：所有 HTTP 相关配置都在这里 =====
http {
    include       mime.types;        # 引入 MIME 类型表，让浏览器正确识别文件类型
    default_type  application/octet-stream;  # 兜底类型（识别不了就当二进制下载）

    sendfile        on;    # 开启零拷贝，静态文件传输更高效
    keepalive_timeout  65; # 长连接超时时间（秒）

    # ===== server 块：一个虚拟主机 =====
    server {
        listen       80;            # 监听 80 端口
        server_name  localhost;     # 匹配的域名/主机名

        # ----- location：按 URL 路径匹配的路由规则 -----
        # 用途一：静态文件服务。访问 / 时去 root 指定的目录找文件
        location / {
            root   /usr/share/nginx/html;  # 静态文件根目录（docker 镜像默认目录）
            index  index.html index.htm;   # 默认首页文件
        }

        # 自定义错误页：50x 错误统一返回一个页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
