<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    注意：这是个「模板」，不是入口。
    HtmlWebpackPlugin 会基于它生成 dist/index.html，
    并自动把打包出的 <script src="xxx.[hash].js"> 注入进来。
    所以这里「不需要」手写 <script> 引入 index.js。
  -->
  <title><%= htmlWebpackPlugin.options.title %></title>
</head>
<body>
  <div id="app"></div>
</body>
</html>
