<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>05 · Performance API + Web Vitals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1420; color: #e6e9ef; line-height: 1.6; padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 6px; }
    .subtitle { color: #8b93a7; margin-bottom: 20px; font-size: 14px; }

    .toolbar { margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      background: #2b3550; color: #e6e9ef; border: 1px solid #3a465f;
      padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #38466a; }

    /* 用来制造一次布局偏移（CLS）和一次交互（INP）的元素 */
    #shifter { height: 0; overflow: hidden; transition: height .2s; background: #1f2a44; border-radius: 8px; margin-bottom: 12px; }
    #shifter.on { height: 90px; padding: 12px; }

    /* ============ 指标卡片面板 ============ */
    #panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .card {
      background: #121826; border: 1px solid #2a3346; border-radius: 12px; padding: 14px 16px;
      animation: fade .25s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(-4px);} to {opacity:1;transform:none;} }
    .card .name { font-size: 13px; color: #8b93a7; display: flex; justify-content: space-between; }
    .card .full { font-size: 11px; color: #5a6478; }
    .card .value { font-size: 26px; font-weight: 700; margin: 6px 0 4px; }
    .card .rating { font-size: 12px; padding: 2px 10px; border-radius: 20px; display: inline-block; }
    .rating.good { background: #0e3b2e; color: #63e6be; }
    .rating.ni   { background: #4a3a12; color: #ffd43b; }
    .rating.poor { background: #4a1f1f; color: #ff8787; }
    .rating.wait { background: #23304a; color: #74c0fc; }
    .card .desc { font-size: 11.5px; color: #6b7488; margin-top: 8px; }
    .card .thr  { font-size: 11px; color: #566; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>05 · Performance API + Web Vitals</h1>
  <p class="subtitle">用原生 PerformanceObserver 采集 TTFB / FCP / LCP / CLS / INP 并按官方阈值评级</p>

  <div class="toolbar">
    <button id="btn-shift">制造一次布局偏移（拉高 CLS）</button>
    <button id="btn-block">制造一次卡顿交互（拉高 INP）</button>
    <button id="btn-report">打印当前所有指标到控制台</button>
  </div>

  <div id="shifter">这是一个突然插入、把下方内容顶下去的区块 —— 就是它造成了布局偏移（CLS）。</div>

  <div id="panel"><!-- demo.js 动态填充每个指标卡片 --></div>

  <script src="demo.js"></script>
</body>
</html>
