<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>为什么需要微前端 · 可视化演示</title>
  <style>
    /* ===== 全局基础样式 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f6fb;
      color: #1f2933;
      line-height: 1.6;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #64748b; margin-bottom: 20px; }

    /* ===== 切换按钮 ===== */
    .switch-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .switch-bar button {
      border: 1px solid #cbd5e1;
      background: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
    }
    .switch-bar button.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    /* ===== 架构可视化画布 ===== */
    .stage {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      margin-bottom: 24px;
      min-height: 300px;
    }
    .stage h2 { font-size: 18px; margin-bottom: 16px; }

    /* 巨石视图：一个大盒子把所有团队塞在一起 */
    .monolith {
      border: 3px dashed #ef4444;
      border-radius: 12px;
      padding: 20px;
      background: repeating-linear-gradient(45deg,#fff,#fff 12px,#fff5f5 12px,#fff5f5 24px);
    }
    .monolith-label {
      display: inline-block;
      background: #ef4444;
      color: #fff;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .teams-row { display: flex; flex-wrap: wrap; gap: 12px; }

    /* 微前端视图：每个团队一个独立卡片 */
    .micro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    .team-card {
      border-radius: 10px;
      padding: 14px;
      color: #fff;
      cursor: pointer;
      transition: transform .15s;
      user-select: none;
    }
    .team-card:hover { transform: translateY(-3px); }
    .team-card b { display: block; font-size: 15px; margin-bottom: 4px; }
    .team-card small { opacity: .9; font-size: 12px; }
    .micro-shell-label {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    /* ===== 痛点 / 收益提示条 ===== */
    .note {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    .note.bad { background: #fef2f2; color: #b91c1c; border-left: 4px solid #ef4444; }
    .note.good { background: #f0fdf4; color: #15803d; border-left: 4px solid #16a34a; }

    /* ===== 5 大原则卡片 ===== */
    .principles h2 { font-size: 18px; margin-bottom: 16px; }
    .principle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .principle {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      border-top: 4px solid #2563eb;
    }
    .principle .icon { font-size: 26px; }
    .principle h3 { font-size: 15px; margin: 8px 0 6px; }
    .principle p { font-size: 13px; color: #475569; }

    /* 团队点击后的浮层提示 */
    #toast {
      position: fixed;
      left: 50%; bottom: 30px;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b; color: #fff;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; opacity: 0;
      transition: all .3s; pointer-events: none;
      max-width: 90%;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <h1>为什么需要微前端（Why Micro Frontends）</h1>
  <p class="subtitle">点击下方按钮，对比「巨石前端」与「微前端」两种架构；点团队卡片看该团队的独立性说明。</p>

  <!-- 视图切换按钮 -->
  <div class="switch-bar">
    <button id="btn-monolith" class="active">🏢 巨石前端（Monolith）</button>
    <button id="btn-micro">🧩 微前端（Micro Frontends）</button>
  </div>

  <!-- 架构展示区（由 JS 动态渲染） -->
  <div class="stage" id="stage"></div>

  <!-- 微前端 5 大核心原则卡片区 -->
  <div class="principles">
    <h2>micro-frontends.org 的 5 大核心原则</h2>
    <div class="principle-grid" id="principle-grid"></div>
  </div>

  <!-- 底部浮层提示 -->
  <div id="toast"></div>

  <script>
    // ============================================================
    // 数据层：把「团队/业务模块」抽象成数据，两种视图共用同一份数据
    // ============================================================
    // 一个中大型电商前端，通常由多个团队各负责一块业务。
    // 巨石架构下它们被塞进同一个代码仓库/同一次构建里；
    // 微前端架构下每个团队独立开发、独立部署。
    const teams = [
      { name: '搜索团队',   feature: '商品搜索 / 筛选', color: '#2563eb', stack: 'React' },
      { name: '商品团队',   feature: '商品详情页',       color: '#7c3aed', stack: 'Vue 3' },
      { name: '购物车团队', feature: '购物车 / 结算',    color: '#db2777', stack: 'Svelte' },
      { name: '订单团队',   feature: '订单 / 物流',      color: '#ea580c', stack: 'Angular' },
      { name: '用户团队',   feature: '登录 / 个人中心',  color: '#0891b2', stack: '原生 JS' }
    ];

    // 巨石前端的 6 大痛点（切到巨石视图时展示）
    const monolithPains = [
      '构建慢：一处改动要重新构建整个巨型应用，本地启动/CI 越来越慢',
      '发布强耦合：任一团队上线都要全量发布，一个 bug 卡住所有人',
      '技术栈锁死：全仓统一框架/版本，想升级或换栈牵一发动全身',
      '代码边界模糊：模块互相 import，久而久之谁都不敢删代码',
      '老系统难融合：新功能要接入遗留系统时，只能被迫沿用旧栈',
      '团队协作冲突：几十人改同一仓库，合并冲突、互相踩踏频繁'
    ];

    // 微前端 5 大核心原则（对照 micro-frontends.org）
    const principles = [
      { icon: '🧬', title: 'Be Technology Agnostic（技术栈无关）',
        desc: '每个团队自由选择框架并独立升级，容器不该强制统一技术栈。' },
      { icon: '🧱', title: 'Isolate Team Code（隔离团队代码）',
        desc: '即使用同一框架也不共享运行时；避免全局变量/状态共享，用浏览器事件通信。' },
      { icon: '🏷️', title: 'Establish Team Prefixes（团队前缀约定）',
        desc: 'CSS 类名、事件名、localStorage、自定义元素统一加团队前缀，避免命名冲突。' },
      { icon: '🌐', title: 'Favor Native Browser Features（优先浏览器原生特性）',
        desc: '优先用浏览器事件、Custom Elements 等原生能力通信，而非发明复杂的全局 API。' },
      { icon: '🛡️', title: 'Build a Resilient Site（弹性容错）',
        desc: '某个微前端加载失败也不拖垮整站；用渐进增强保证核心内容可用。' }
    ];

    // ============================================================
    // 视图层
    // ============================================================
    const stage = document.getElementById('stage');
    const btnMono = document.getElementById('btn-monolith');
    const btnMicro = document.getElementById('btn-micro');

    // 渲染「巨石前端」视图：所有团队被一个红色虚线大框圈在一起
    function renderMonolith() {
      const cards = teams.map(t => `
        <div class="team-card" style="background:${t.color}" data-name="${t.name}" data-stack="锁死为主栈">
          <b>${t.name}</b>
          <small>${t.feature}</small>
        </div>`).join('');
      stage.innerHTML = `
        <h2>🏢 巨石前端：一个仓库 / 一次构建 / 一起发布</h2>
        <div class="monolith">
          <span class="monolith-label">单一巨型应用（Frontend Monolith）</span>
          <div class="teams-row">${cards}</div>
        </div>
        <div class="note bad">
          <b>6 大痛点：</b><br>${monolithPains.map((p,i)=>`${i+1}. ${p}`).join('<br>')}
        </div>`;
      bindTeamClicks('monolith');
    }

    // 渲染「微前端」视图：每个团队一张独立卡片，各自独立部署
    function renderMicro() {
      const cards = teams.map(t => `
        <div class="team-card" style="background:${t.color}" data-name="${t.name}" data-stack="${t.stack}">
          <b>${t.name}</b>
          <small>${t.feature}<br>技术栈：${t.stack}</small>
        </div>`).join('');
      stage.innerHTML = `
        <h2>🧩 微前端：容器(Shell) 组合多个独立子应用</h2>
        <span class="micro-shell-label">容器应用 Shell（负责路由与组合）</span>
        <div class="micro-grid">${cards}</div>
        <div class="note good">
          <b>收益：</b>独立开发、独立部署、技术栈自由、边界清晰、可增量替换老系统、团队自治不再互相阻塞。
        </div>`;
      bindTeamClicks('micro');
    }

    // 给团队卡片绑定点击：弹出该团队在当前架构下的独立性说明
    function bindTeamClicks(mode) {
      document.querySelectorAll('.team-card').forEach(card => {
        card.addEventListener('click', () => {
          const name = card.dataset.name;
          const stack = card.dataset.stack;
          const msg = mode === 'micro'
            ? `✅ ${name}：独立仓库 + 独立构建 + 独立部署，技术栈可用【${stack}】，上线不影响他人`
            : `⚠️ ${name}：被绑进巨石里，技术栈${stack}，改一行也要全量构建、全量发布`;
          showToast(msg);
        });
      });
    }

    // 底部浮层提示
    let toastTimer;
    function showToast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
    }

    // 渲染 5 大原则卡片
    function renderPrinciples() {
      document.getElementById('principle-grid').innerHTML = principles.map(p => `
        <div class="principle">
          <div class="icon">${p.icon}</div>
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
        </div>`).join('');
    }

    // ============================================================
    // 交互：切换按钮
    // ============================================================
    btnMono.addEventListener('click', () => {
      btnMono.classList.add('active');
      btnMicro.classList.remove('active');
      renderMonolith();
    });
    btnMicro.addEventListener('click', () => {
      btnMicro.classList.add('active');
      btnMono.classList.remove('active');
      renderMicro();
    });

    // ============================================================
    // 初始化：默认展示巨石视图 + 原则卡片
    // ============================================================
    renderMonolith();
    renderPrinciples();
  </script>
</body>
</html>
