<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14 · 剪贴板与其他常用 API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f4f6; color: #222; padding: 28px 16px; line-height: 1.6;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #777; font-size: 13px; margin-bottom: 20px; }
    .section {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .section h2 { font-size: 16px; margin-bottom: 12px; }
    input, textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 10px;
    }
    input:focus, textarea:focus { border-color: #4f46e5; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 9px 16px; border: none; border-radius: 8px;
      background: #4f46e5; color: #fff; font-size: 14px; cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button.ghost { background: #eef0ff; color: #4f46e5; }
    .status {
      display: none; margin-top: 12px; padding: 9px 12px;
      border-radius: 8px; font-size: 13px;
    }
    .status.ok { background: #e6f7ed; color: #1a7f44; }
    .status.err { background: #fdecea; color: #c0392b; }
    .mqbox {
      margin-top: 8px; padding: 12px; border-radius: 8px;
      background: #fff8e1; font-size: 14px; transition: .2s;
    }
    .mqbox.dark { background: #1e293b; color: #e2e8f0; }
    .note { font-size: 12px; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧰 剪贴板与其他常用 Web API</h1>
    <p class="sub">建议用 <code>localhost</code> 或 <code>https</code> 打开，部分 API 在 file:// 下受限。</p>

    <!-- 1. 剪贴板 -->
    <div class="section">
      <h2>📋 1. 剪贴板（Clipboard，带 execCommand 兜底）</h2>
      <textarea id="copyText" rows="2" placeholder="输入要复制的文本…">Hello Web API! 这段文字可以一键复制。</textarea>
      <div class="btns">
        <button id="copyBtn">复制到剪贴板</button>
        <button id="pasteBtn" class="ghost">读取剪贴板</button>
      </div>
      <div id="copyStatus" class="status"></div>
    </div>

    <!-- 2. 通知 -->
    <div class="section">
      <h2>🔔 2. 系统通知（Notification）</h2>
      <div class="btns">
        <button id="notifyBtn">请求权限并弹通知</button>
      </div>
      <div id="notifyStatus" class="status"></div>
      <p class="note">首次点击浏览器会询问是否允许通知；允许后屏幕角落会弹出。</p>
    </div>

    <!-- 3. matchMedia -->
    <div class="section">
      <h2>🌗 3. matchMedia（监听系统暗色模式 / 视口）</h2>
      <div id="darkBox" class="mqbox"></div>
      <div id="wideBox" class="mqbox" style="background:#eef2ff;"></div>
      <p class="note">把系统切到暗色模式，或缩放浏览器窗口，上面的文字会实时变化。</p>
    </div>

    <!-- 4. 其他 -->
    <div class="section">
      <h2>📤 4. Web Share / 地理定位（简介）</h2>
      <div class="btns">
        <button id="shareBtn">调起系统分享</button>
        <button id="geoBtn" class="ghost">获取我的位置</button>
      </div>
      <div id="otherStatus" class="status"></div>
      <p class="note">这两个多见于移动端 / 安全上下文，会弹系统权限框。</p>
    </div>
  </div>

  <script src="demo.js"></script>
</body>
</html>
