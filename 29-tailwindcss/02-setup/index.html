<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 · 安装方式一：Play CDN（免装）</title>

  <!--
    ▼ 方式一：Play CDN（v4）
    优点：零安装，双击即可用；缺点：浏览器实时编译，体积大、仅供学习。
    v4 → https://unpkg.com/@tailwindcss/browser@4
    v3 → https://cdn.tailwindcss.com（两者不通用！）
  -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!--
    CDN 版也能定制主题：写一个 <style type="text/tailwindcss"> 块，
    里面用 v4 的 @theme 语法（下方 07-customization 详解）。
  -->
  <style type="text/tailwindcss">
    @theme {
      --color-brand: #6750a4;   /* 自定义品牌色 → 生成 bg-brand / text-brand 等工具类 */
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen grid place-items-center p-8 font-sans">
  <div class="max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="w-14 h-14 rounded-full bg-brand mx-auto mb-4 grid place-items-center text-white text-2xl font-bold">T</div>
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Play CDN 跑通了！</h1>
    <p class="text-slate-500 leading-relaxed mb-4">
      这个圆圈用的是自定义的 <code class="bg-slate-100 px-1 rounded text-brand">bg-brand</code>，
      来自 <code class="bg-slate-100 px-1 rounded">&lt;style type="text/tailwindcss"&gt;</code> 里的 <code class="bg-slate-100 px-1 rounded">@theme</code>。
    </p>
    <p class="text-xs text-slate-400">生产环境请改用 Vite 工程化（见同目录 vite-project/）</p>
  </div>
</body>
</html>
