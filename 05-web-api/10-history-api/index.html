<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 · History API 与 SPA 路由</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0; padding: 0; background: #f5f7fa; color: #2c3e50;
    }
    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; padding: 28px 24px;
    }
    header h1 { margin: 0 0 6px; font-size: 22px; }
    header p { margin: 0; opacity: .9; font-size: 14px; }
    .wrap { max-width: 860px; margin: 24px auto; padding: 0 16px; }
    /* 导航栏 */
    nav.spa-nav {
      display: flex; gap: 8px; flex-wrap: wrap;
      background: #fff; padding: 12px; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    nav.spa-nav a {
      text-decoration: none; color: #555; padding: 8px 16px;
      border-radius: 8px; font-size: 14px; transition: all .2s;
      border: 1px solid transparent;
    }
    nav.spa-nav a:hover { background: #f0f2ff; color: #667eea; }
    nav.spa-nav a.active {
      background: #667eea; color: #fff; font-weight: 600;
    }
    /* 视图容器 */
    #view {
      margin-top: 18px; background: #fff; border-radius: 12px;
      padding: 28px; min-height: 180px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      animation: fade .35s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    #view h2 { margin-top: 0; color: #667eea; }
    .badge {
      display: inline-block; background: #eef; color: #667eea;
      border-radius: 999px; padding: 2px 10px; font-size: 12px; margin-left: 6px;
    }
    /* 控制按钮 */
    .controls { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .controls button {
      cursor: pointer; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 14px; color: #fff; background: #764ba2;
      transition: opacity .2s;
    }
    .controls button:hover { opacity: .85; }
    /* URL / state 监视器 */
    .monitor {
      margin-top: 18px; background: #1e1e2e; color: #a6e3a1;
      border-radius: 10px; padding: 14px 18px; font-family: ui-monospace, Menlo, monospace;
      font-size: 13px; line-height: 1.7; overflow-x: auto;
    }
    .monitor .k { color: #89b4fa; }
    .monitor .v { color: #f9e2af; }
    .log {
      margin-top: 14px; background: #fff; border-radius: 10px;
      padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
      font-family: ui-monospace, Menlo, monospace; font-size: 12px;
      max-height: 160px; overflow-y: auto;
    }
    .log div { padding: 2px 0; border-bottom: 1px dashed #eee; }
    .tip { font-size: 12px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>10 · History API 与 SPA 前端路由</h1>
    <p>点击导航不刷新页面切换内容，浏览器前进/后退由 popstate 驱动</p>
  </header>

  <div class="wrap">
    <!-- SPA 导航：用 data-page 标识目标视图，JS 拦截点击 -->
    <nav class="spa-nav" id="nav">
      <a href="?page=home"    data-page="home">🏠 首页</a>
      <a href="?page=about"   data-page="about">📄 关于</a>
      <a href="?page=list"    data-page="list">📋 列表</a>
      <a href="?page=contact" data-page="contact">✉️ 联系</a>
    </nav>

    <!-- 视图渲染区，内容由 demo.js 写入，永不整页刷新 -->
    <section id="view"></section>

    <div class="controls">
      <button id="btnBack">⬅️ history.back()</button>
      <button id="btnForward">history.forward() ➡️</button>
      <button id="btnGo2">history.go(-2)</button>
      <button id="btnReplace">replaceState（替换当前）</button>
    </div>

    <!-- 实时显示当前 URL 与 history.state -->
    <div class="monitor" id="monitor"></div>

    <div class="log" id="log"></div>
    <p class="tip">提示：本 demo 用 <code>?page=xxx</code> 查询串形式改 URL，因此 file:// 双击直接打开也能运行。生产环境用 /path 形式时，刷新需服务器回退到 index.html。</p>
  </div>

  <script src="demo.js"></script>
</body>
</html>
