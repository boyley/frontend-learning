<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14 · 组合式 API 与 setup</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; }
    h3 { margin-top: 0; color: #42b883; }
    button { padding: 6px 12px; margin: 4px 4px 0 0; cursor: pointer; }
    .col { display: flex; gap: 16px; }
    .col > div { flex: 1; }
    code { background: #f5f5f5; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>14 · 组合式 API 与 setup（Composition API）</h1>
  <div id="app">
    <div class="card">
      <h3>同一个计数器逻辑，组合式写法</h3>
      <p>count = {{ count }}，double = {{ double }}</p>
      <button @click="increment">+1</button>
      <button @click="reset">重置</button>
      <p>状态：{{ status }}</p>
    </div>
    <div class="card">
      <h3>说明</h3>
      <p>本页用 CDN 的 <code>setup()</code> 函数写法演示组合式 API。</p>
      <p>在 Vite/单文件组件(.vue)中，等价的更简洁写法是 <code>&lt;script setup&gt;</code>，
         顶层声明的变量/函数自动暴露给模板，无需 return（见 README 对照）。</p>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, computed, watch } = Vue;
    createApp({
      // setup() 是组合式 API 入口：相关逻辑（数据+计算+方法+侦听）聚在一起
      setup() {
        const count = ref(0);
        const double = computed(() => count.value * 2); // 计算属性
        const status = ref('就绪');

        const increment = () => count.value++;
        const reset = () => (count.value = 0);

        // 侦听器也写在一起
        watch(count, (n) => {
          status.value = n >= 5 ? '⚠️ 数字有点大了' : '就绪';
        });

        // 组合式 API 必须 return 才能在模板使用（script setup 则免去这步）
        return { count, double, status, increment, reset };
      }
    }).mount('#app');
  </script>
</body>
</html>
