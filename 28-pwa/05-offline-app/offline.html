<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>离线兜底页</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; margin: 0; height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; text-align: center; }
    .box { padding: 2rem; }
    .emoji { font-size: 4rem; }
    h1 { margin: .5rem 0; }
    p { opacity: .8; }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">📴</div>
    <h1>你正处于离线状态</h1>
    <p>请求的页面尚未缓存，且当前无法联网。<br/>恢复网络后再试，或返回已缓存的首页。</p>
    <p><a href="./index.html" style="color:#93c5fd">← 回到首页（已离线缓存）</a></p>
  </div>
</body>
</html>
