<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 · Canvas 2D 绘图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f4f6; color: #222; padding: 28px 16px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #777; font-size: 13px; margin-bottom: 20px; }
    .section {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .section h2 { font-size: 16px; margin-bottom: 12px; }
    /* 注意：canvas 用 width/height 属性定分辨率，这里只控制最大宽不拉伸 */
    canvas { border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; display: block; max-width: 100%; }
    #board { cursor: crosshair; background: #fdfdfd; }
    .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
    .controls label { font-size: 14px; display: flex; align-items: center; gap: 6px; }
    input[type="color"] { width: 40px; height: 28px; border: none; background: none; cursor: pointer; }
    input[type="range"] { vertical-align: middle; }
    button {
      padding: 8px 16px; border: none; border-radius: 8px;
      background: #e2574c; color: #fff; font-size: 14px; cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    .tip { font-size: 12px; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎨 Canvas 2D 绘图</h1>
    <p class="sub">canvas 是一块位图画布，一旦画下就没有「对象」概念（不像 SVG）。</p>

    <!-- 1. 基本图形 -->
    <div class="section">
      <h2>1. 基本图形（矩形 / 圆 / 线 / 三角 / 文字）</h2>
      <!-- 用 width/height 属性而非 CSS，避免拉伸模糊 -->
      <canvas id="shapeCanvas" width="400" height="220"></canvas>
    </div>

    <!-- 2. 画板 -->
    <div class="section">
      <h2>2. 简易画板（按住鼠标拖动绘制）</h2>
      <div class="controls">
        <label>颜色 <input type="color" id="color" value="#4f46e5" /></label>
        <label>线宽
          <input type="range" id="lineWidth" min="1" max="30" value="4" />
          <span id="widthLabel">4 px</span>
        </label>
        <button id="clearBoard">清空画板</button>
      </div>
      <canvas id="board" width="660" height="320"></canvas>
      <p class="tip">在画布上按住鼠标拖动即可绘制；支持触摸屏。坐标用 getBoundingClientRect 校正。</p>
    </div>

    <!-- 3. 动画 -->
    <div class="section">
      <h2>3. requestAnimationFrame 动画</h2>
      <canvas id="animCanvas" width="220" height="160"></canvas>
      <p class="tip">小球绕圈：每帧 clearRect 清屏 + 重画，靠 requestAnimationFrame 驱动。</p>
    </div>
  </div>

  <script src="demo.js"></script>
</body>
</html>
