<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 · 状态提升（Lifting State Up）</title>
  <!-- React 18 运行时（开发版，含友好报错） -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel standalone：让浏览器直接运行 JSX，免构建 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 640px; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; padding: 16px; }
    legend { font-weight: 600; }
    input { font-size: 16px; padding: 6px 8px; width: 120px; }
    .verdict { font-size: 18px; padding: 10px; border-radius: 8px; background: #f3f4f6; }
    .boil { background: #fee2e2; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ===== 工具函数：摄氏 <-> 华氏 互转 =====
    function toCelsius(f)    { return (f - 32) * 5 / 9; }
    function toFahrenheit(c) { return (c * 9 / 5) + 32; }

    // 把字符串温度从一种刻度转换到另一种，保留 3 位小数；输入非法时返回空串
    function tryConvert(temperature, convert) {
      const input = parseFloat(temperature);
      if (Number.isNaN(input)) return '';
      const output = convert(input);
      const rounded = Math.round(output * 1000) / 1000;
      return rounded.toString();
    }

    const scaleNames = { c: '摄氏度', f: '华氏度' };

    // ===== 子组件：单个温度输入框 =====
    // 注意：它是“受控组件”，自己不保存 state，
    // 值来自父组件的 props.temperature，
    // 修改时通过 props.onTemperatureChange 把新值“上报”给父组件。
    function TemperatureInput({ scale, temperature, onTemperatureChange }) {
      return (
        <fieldset>
          <legend>请输入{scaleNames[scale]}：</legend>
          <input
            value={temperature}
            // 事件上行：子组件不直接改状态，只通知父组件
            onChange={(e) => onTemperatureChange(e.target.value)}
          />
        </fieldset>
      );
    }

    // ===== 父组件：持有“唯一数据源” =====
    // 共享的状态（温度值 + 当前以哪个刻度输入）提升到这里，
    // 两个子输入框都从这个状态派生显示，从而保持联动。
    function Calculator() {
      const [temperature, setTemperature] = useState(''); // 当前输入的数值（字符串）
      const [scale, setScale] = useState('c');            // 当前输入的刻度：'c' 或 'f'

      // 任一输入框改变 -> 记录“是哪个刻度被改了”和“新值”
      const handleCelsiusChange = (value) => { setScale('c'); setTemperature(value); };
      const handleFahrenheitChange = (value) => { setScale('f'); setTemperature(value); };

      // 数据下行：根据“唯一数据源”计算两个框各自应显示的值
      const celsius    = scale === 'f' ? tryConvert(temperature, toCelsius)    : temperature;
      const fahrenheit = scale === 'c' ? tryConvert(temperature, toFahrenheit) : temperature;

      return (
        <div>
          <h1>🌡️ 温度换算（状态提升示例）</h1>
          <p>改任意一个输入框，另一个会自动联动——因为它们共享同一份 state。</p>

          <TemperatureInput
            scale="c"
            temperature={celsius}
            onTemperatureChange={handleCelsiusChange}
          />
          <TemperatureInput
            scale="f"
            temperature={fahrenheit}
            onTemperatureChange={handleFahrenheitChange}
          />

          {/* 第三个子组件也消费同一份状态：判断是否沸腾 */}
          <BoilingVerdict celsius={parseFloat(celsius)} />
        </div>
      );
    }

    // ===== 又一个子组件：纯展示，复用同一份共享状态 =====
    function BoilingVerdict({ celsius }) {
      if (Number.isNaN(celsius)) {
        return <p className="verdict">请输入温度…</p>;
      }
      return celsius >= 100
        ? <p className="verdict boil">💨 水会沸腾！</p>
        : <p className="verdict">❄️ 水不会沸腾。</p>;
    }

    function App() { return <Calculator />; }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
