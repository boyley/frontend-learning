# reverse-proxy.conf
# ─────────────────────────────────────────────────────────────
# 演示 Nginx 第二大用途：反向代理。
# 把发到 Nginx 的请求转发给后端应用（比如一个跑在 3000 端口的 Node 服务）。
# 这段通常被 include 进 http {} 块，或直接放进一个 server {} 里。
# ─────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  localhost;

    # ----- 反向代理到后端 -----
    location / {
        # proxy_pass：把请求转发到这个后端地址
        proxy_pass http://127.0.0.1:3000;

        # ↓↓↓ 关键：把「真实来源信息」通过请求头传给后端 ↓↓↓
        # 否则后端只看到 Nginx 自己的信息，拿不到真实客户端 IP / 域名。

        # Host：把原始请求的 Host 头透传给后端
        #（后端如果按域名做虚拟主机/路由，必须要有）
        proxy_set_header Host $host;

        # X-Real-IP：真实客户端 IP（单个）
        proxy_set_header X-Real-IP $remote_addr;

        # X-Forwarded-For：代理链，追加式记录经过的每一跳 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # X-Forwarded-Proto：原始协议（http / https），
        # 后端用它判断用户到底走的是不是 https（SSL 终结场景常用）
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- 只把某个路径前缀代理到某个后端（API 网关雏形）-----
    # 例如 /api/ 走后端服务，其余走静态资源
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
