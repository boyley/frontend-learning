# load-balance.conf
# ─────────────────────────────────────────────────────────────
# 演示 Nginx 第一大用途：负载均衡。
# 核心两步：① upstream 块定义后端服务器组；② proxy_pass 指向这个组名。
# 下面把 5 种分发策略都写出来，用注释切换（同一时间只启用一种 upstream）。
# ─────────────────────────────────────────────────────────────

# ============ 策略 1：轮询 round-robin（默认，不写任何算法关键字）============
# 请求按顺序依次分发给每台，最简单最常用。
upstream backend {
    server 127.0.0.1:3001;   # 后端节点 1
    server 127.0.0.1:3002;   # 后端节点 2
    server 127.0.0.1:3003;   # 后端节点 3
}

# ============ 策略 2：加权轮询 weight ============
# 性能好的机器多分点。weight 越大，分到的请求越多（默认 weight=1）。
# upstream backend {
#     server 127.0.0.1:3001 weight=3;   # 分到 3/5 的流量
#     server 127.0.0.1:3002 weight=1;
#     server 127.0.0.1:3003 weight=1;
# }

# ============ 策略 3：最少连接 least_conn ============
# 把新请求给「当前活跃连接最少」的后端，适合请求处理时长差异大的场景。
# upstream backend {
#     least_conn;
#     server 127.0.0.1:3001;
#     server 127.0.0.1:3002;
#     server 127.0.0.1:3003;
# }

# ============ 策略 4：IP 哈希 ip_hash（会话保持）============
# 按客户端 IP 做哈希，同一个 IP 每次都落到同一台后端。
# 适合把 session 存在本机内存、又没做共享 session 的老应用。
# upstream backend {
#     ip_hash;
#     server 127.0.0.1:3001;
#     server 127.0.0.1:3002;
#     server 127.0.0.1:3003;
# }

# ============ 策略 5：一致性哈希 hash ... consistent ============
# 按指定 key（这里用请求 URI）做一致性哈希；consistent 保证
# 增删后端时只有少量 key 需要重新映射，缓存命中率更稳（CDN/缓存常用）。
# upstream backend {
#     hash $request_uri consistent;
#     server 127.0.0.1:3001;
#     server 127.0.0.1:3002;
#     server 127.0.0.1:3003;
# }

server {
    listen 80;
    server_name localhost;

    location / {
        # proxy_pass 指向 upstream 组名（注意这里是组名 backend，不是具体地址）
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─────────────────────────────────────────────────────────────
# 附：被动健康检查（开源版内置）
# 在 server 行后加 max_fails / fail_timeout：
#   server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
# 含义：30s 内失败 3 次，就把这台标记为不可用，暂停 30s 后再试。
# 还可用 backup 标记备份节点（主全挂了才启用）、down 标记临时下线：
#   server 127.0.0.1:3004 backup;
#   server 127.0.0.1:3005 down;
# ─────────────────────────────────────────────────────────────
