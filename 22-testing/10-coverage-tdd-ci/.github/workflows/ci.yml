# 示例 CI：每次 push / PR 自动跑测试 + 覆盖率，红线不达标就让流水线失败。
# 官方：https://docs.github.com/actions  ·  https://jestjs.io/docs/cli
# 注：本文件放在模块内作演示；真实项目应放在【仓库根目录】的 .github/workflows/ 下。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1) 拉代码
      - uses: actions/checkout@v4

      # 2) 装 Node 并开启 npm 缓存，加速安装
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 22-testing/10-coverage-tdd-ci/package-lock.json

      # 3) 安装依赖（CI 用 npm ci，按 lockfile 精确、可复现）
      - name: Install
        working-directory: 22-testing/10-coverage-tdd-ci
        run: npm ci

      # 4) 跑测试 + 覆盖率；低于 jest.config.js 的 coverageThreshold 会退出码非 0 → 流水线红
      - name: Test with coverage
        working-directory: 22-testing/10-coverage-tdd-ci
        run: npm run ci

      # 5)（可选）上传覆盖率报告到 Codecov 等平台
      # - uses: codecov/codecov-action@v4
      #   with:
      #     files: 22-testing/10-coverage-tdd-ci/coverage/lcov.info
